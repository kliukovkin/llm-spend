# Model pricing table for llm-spend.
#
# Used ONLY for same-model what-if comparisons (batch gap, service-tier gap,
# cache hit-rate savings). Actual spend always comes from each provider's
# cost/usage API — never from this file. If this file drifts from reality,
# what-if numbers drift; billing totals do not.
#
# All prices are USD per 1,000,000 tokens. Updated manually — no fetching at
# runtime. Deprecated/retired models are intentionally omitted; add them back
# if you need to analyze historical usage against a retired model.
#
# Sources (fetched 2026-07-03):
#   https://platform.claude.com/docs/en/about-claude/pricing
#   https://developers.openai.com/api/docs/pricing
as_of: "2026-07-03"

openai:
  gpt-5.5:
    input: 5.00
    cached_input: 0.50
    output: 30.00
    batch_input: 2.50
    batch_output: 15.00
  gpt-5.4:
    input: 2.50
    cached_input: 0.25
    output: 15.00
    batch_input: 1.25
    batch_output: 7.50
  gpt-5.4-mini:
